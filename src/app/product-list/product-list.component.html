<h2>Lista de Productos</h2>

<div *ngIf="products.length === 0">
  No hay productos registrados
</div>

<ul *ngIf="products.length > 0">
  <li *ngFor="let product of products">
    {{ product.name }} - ${{ product.price }}

    <button (click)="deleteProduct(product.id)">
      Eliminar
    </button>
  </li>
</ul>
